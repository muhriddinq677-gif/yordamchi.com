<html lang="uz">
<head>
<meta charset="UTF-8">

<title>Mantiqiy savollar</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:10px;}
.container{width:100%;max-width:600px;background:rgba(0,0,0,0.9);padding:20px;border-radius:20px;text-align:center;}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;cursor:pointer;font-size:15px;transition:0.3s;}
button:hover{background:gold;color:black;}
.hidden{display:none;}
.topbar{display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px;font-size:14px;}
@media(max-width:500px){.topbar{flex-direction:column;align-items:center;gap:5px;} button{font-size:14px;}}
select{margin-bottom:10px;padding:5px;border-radius:5px;border:none;}
.controls{display:flex;justify-content:space-around;margin-top:15px;}
.control-btn{width:30%;padding:10px;border-radius:10px;}
</style>
</head>

<button id="nextBtn" class="control-btn hidden">➡ Keyingi</button>
<button id="backToHome" class="control-btn">⬅ Orqaga</button>

<h3 id="result"></h3>

const startBtn=document.getElementById("startBtn"),languageSelect=document.getElementById("language");

const shopBtnHome=document.getElementById("shopBtnHome"),backBtn=document.getElementById("backBtn"),backToHome=document.getElementById("backToHome");
const emojiEl=document.getElementById("emoji"),questionEl=document.getElementById("question"),answersEl=document.getElementById("answers");
const pointEl=document.getElementById("point"),coinEl=document.getElementById("coin"),hintEl=document.getElementById("hintCount"),levelEl=document.getElementById("levelNum"),timerEl=document.getElementById("timer"),resultEl=document.getElementById("result");
const titleEl=document.getElementById("title"),langLabel=document.getElementById("langLabel"),startBtnEl=document.getElementById("startBtn"),shopBtnEl=document.getElementById("shopBtnHome"),shopTitle=document.getElementById("shopTitle");

// ===== TRANSLATE =====
function translateUI(){

checkBtn.innerText="✅ Tekshirish";
hintBtn.innerText="💡 Hint";
nextBtn.innerText="➡ Keyingi";
backToHome.innerText="⬅ Orqaga";
backBtn.innerText="⬅ Orqaga";
}else if(lang==="ru"){
titleEl.innerText="⚽ Футбольная Викторина PRO";
langLabel.innerText="Выберите язык:";
startBtnEl.innerText="🎮 Начать";
shopBtnEl.innerText="💎 Магазин";
shopTitle.innerText="💎 Магазин";
checkBtn.innerText="✅ Проверить";
hintBtn.innerText="💡 Подсказка";
nextBtn.innerText="➡ Далее";
backToHome.innerText="⬅ Назад";
backBtn.innerText="⬅ Назад";
}else{
titleEl.innerText="⚽ Football Quiz PRO";
langLabel.innerText="Select Language:";
startBtnEl.innerText="🎮 Start";
shopBtnEl.innerText="💎 Shop";
shopTitle.innerText="💎 Shop";
checkBtn.innerText="✅ Check";
hintBtn.innerText="💡 Hint";
nextBtn.innerText="➡ Next";
backToHome.innerText="⬅ Back";
backBtn.innerText="⬅ Back";
}
}

// ===== UI UPDATE =====
function updateUI(){
pointEl.innerText=point;
coinEl.innerText=coin;
hintEl.innerText=hintCount;
translateUI();
}

// ===== START GAME =====
startBtn.onclick=function(){
lang=languageSelect.value;
updateUI();
home.classList.add("hidden");
game.classList.remove("hidden");
currentLevel=1;
currentQuestion=0;
loadQuestion();
};

// ===== LOAD QUESTION =====
function loadQuestion(){
let q=questions[currentQuestion];
emojiEl.innerText=q.emoji;
questionEl.innerText=q.question[lang];
answersEl.innerHTML="";
selectedAnswer=null;
nextBtn.classList.add("hidden");
q.answers.forEach((a,i)=>{
let btn=document.createElement("button");
btn.innerText=a[lang];
btn.onclick=()=>{selectedAnswer=i;highlightSelection(i)};
answersEl.appendChild(btn);
});
resultEl.innerText="";
hintBtn.disabled=false;
startTimer();
levelEl.innerText=currentLevel;
updateUI();
}

function highlightSelection(index){
let buttons=answersEl.children;
for(let i=0;i<buttons.length;i++){
buttons[i].style.background=(i===index)?"orange":"";
}
}

// ===== TIMER =====
function startTimer(){
clearInterval(timer);
timeLeft=60;
updateTimer();
timer=setInterval(()=>{
timeLeft--;
updateTimer();
if(timeLeft<=0){
clearInterval(timer);
autoCheck();
}
},1000);
}
function updateTimer(){timerEl.innerText=timeLeft+"s";}

// ===== CHECK =====
checkBtn.onclick=function(){
clearInterval(timer);
if(selectedAnswer===null){
alert(lang==="uz"?"Avval javobni tanlang!":lang==="ru"?"Сначала выберите ответ!":"Select an answer first!");
return;
}
checkAnswer();
};
function autoCheck(){if(selectedAnswer===null) selectedAnswer=-1;hintBtn.disabled=true;checkAnswer();}

function checkAnswer(){
let q=questions[currentQuestion];
hintBtn.disabled=true;
if(selectedAnswer===q.correct){
point+=1;
resultEl.innerText="✅ "+(lang==="uz"?"To'g'ri!":"ru"?"Верно!":"Correct!")+" +1 Point";
}else{
resultEl.innerText="❌ "+(lang==="uz"?"Noto'g'ri!":"ru"?"Неверно!":"Wrong!");
}

// ===== POINT -> COIN -> HINT =====
if(point>=10){
let newCoin=Math.floor(point/10);
if(newCoin>0){coin+=newCoin;point%=10;}
}
if(coin>=10){
let newHint=Math.floor(coin/10);
if(newHint>0){hintCount+=newHint;coin%=10;}
}

updateUI();
localStorage.setItem("coin",coin);
nextBtn.classList.remove("hidden"); // Keyingi savol tugmasi ko‘rsin
}

// ===== NEXT LEVEL BUTTON =====
nextBtn.onclick=function(){
currentLevel++;
if(currentLevel>questions.length){
alert((lang==="uz"?"🎉 O'yin tugadi! Umumiy ball: ":"ru"?"🎉 Игра окончена! Общий балл: ":"🎉 Game over! Total point: ")+point);
location.reload();
return;
}
currentQuestion=currentLevel-1;
loadQuestion();
}

// ===== HINT =====
hintBtn.onclick=function(){
if(hintCount>0){
hintCount--;
let q=questions[currentQuestion];
alert((lang==="uz"?"To'g'ri javob: ":"ru"?"Правильный ответ: ":"Correct answer: ")+q.answers[q.correct][lang]);
updateUI();
}else{
alert(lang==="uz"?"Hint yetarli emas!":"ru"?"Нет подсказок!":"No hint available!");
}
}

// ===== SHOP =====
shopBtnHome.onclick=function(){
game.classList.add("hidden");
home.classList.add("hidden");
shop.classList.remove("hidden");
};
document.querySelectorAll(".buyBtn").forEach(btn=>{
btn.onclick=function(){
let amt=parseInt(btn.dataset.amount);
let neededPoint=amt*10;
if(point>=neededPoint){
point-=neededPoint;
coin+=amt;
updateUI();
localStorage.setItem("coin",coin);
alert(amt+" "+(lang==="uz"?"coin qo'shildi!":"ru"?"монет добавлено!":"coin added!"));
}else{
alert(lang==="uz"?"Yetarli point yo'q!":"ru"?"Недостаточно очков!":"Not enough point!");
}
};
});
backBtn.onclick=function(){
shop.classList.add("hidden");
home.classList.remove("hidden");
};
backToHome.onclick=function(){
game.classList.add("hidden");
home.classList.remove("hidden");
updateUI();
};
</script>
</body>
</html>

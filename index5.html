<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>So'z topish -</title>
<style>
 body{ margin:0; background:#f3e6c8; font-family:Arial,sans-serif; text-align:center; user-select:none; touch-action:none; }
 #menu{ padding:15px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; align-items: center; background: #e6d5b0; }
 .time-group { display: flex; align-items: center; gap: 5px; background: #fff; padding: 5px 10px; border-radius: 5px; border: 1px solid #aaa; }
 select, button{ padding:8px; font-size:16px; cursor:pointer; border-radius: 4px; border: 1px solid #999; }
 #top{ display:flex; justify-content:space-between; padding:10px 20px; font-weight:bold; background:rgba(0,0,0,0.1); font-size: 18px; }
 #board{ display:flex; flex-direction:column; gap:10px; margin-top:20px; min-height:120px; }
 .word{ display:flex; justify-content:center; gap:6px; }
 .slot{ width:40px; height:40px; border-radius:8px; background:#fff; border:2px solid #999; line-height:40px; font-size:22px; color:transparent; font-weight: bold; }
 .word.done .slot{ background:#7be495; border-color:#2e7d32; color:#000; transition: 0.3s; }
 #wheel{ position:relative; width:280px; height:280px; margin:40px auto; border-radius:50%; background:#5865f2; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
 .letter{ position:absolute; width:50px; height:50px; border-radius:50%; background:#1c2340; color:#fff; font-size:24px; line-height:50px; z-index:2; font-weight: bold; cursor: pointer; }
 .letter.used{ opacity:0.3; transform: scale(0.9); }
 canvas{ position:absolute; inset:0; pointer-events:none; z-index:1; }
</style>
</head>
<body>

<div id="menu">
 <select id="lang">
  <option value="uz">O‘zbek</option>
  <option value="en">English</option>
  <option value="ru">Русский</option>
  <option value="ar">العربية</option>
  <option value="fr">Français</option>
 </select>

 <div class="time-group">
  <select id="hSel" title="Soat"></select> :
  <select id="mSel" title="Minut"></select> :
  <select id="sSel" title="Sekund"></select>
 </div>

 <button onclick="startGame()" style="background: #2e7d32; color: white; border: none; padding: 8px 20px;">Boshlash</button>
</div>

<div id="top">
 <div>Bosqich: <span id="level">1</span></div>
 <div>⏱ <span id="timeDisplay">00:00:00</span></div>
 <div>⭐ <span id="score">0</span></div>
</div>

<div id="board"></div>

<div id="wheel">
 <canvas id="c" width="280" height="280"></canvas>
</div>

<script>
// Vaqt tanlagichlarini to'ldirish
const fillSel = (id, max, def) => {
    let s = document.getElementById(id);
    for(let i=0; i<=max; i++){
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = i < 10 ? "0" + i : i;
        if(i === def) opt.selected = true;
        s.appendChild(opt);
    }
};
fillSel("hSel", 23, 0); fillSel("mSel", 59, 5); fillSel("sSel", 59, 0);

const WORDS={
 uz:["UY","NON","SUV","KUN","BOLA","OLMA","KITOB","YO‘L","OYNA","DARA","DO‘ST","MAKTAB","YULDUZ","TOG‘","DENGIZ","QUSH","BARG","MEVA","SABZI","GURUCH","OSH","CHIROQ","STOL","ESHIK","SOAT","KO‘Z","QULOQ","BURUN","LAB","TIL","QO‘L","OYOQ","BOSH","YURAK","QON","SUYAK","OYIN","KULGI","OVOZ","SO‘Z","HIKOYA","DAFTAR","RANG","SHAKAR","TUZ"],
 en:["UP","IT","SUN","BOOK","TREE","ROAD","APPLE","HOUSE","WATER","BREAD","STAR","MOON","SEA","BIRD","FOOD","TABLE","CHAIR","PHONE","TIME","DAY","NIGHT","MUSIC","WORD","COLOR","GREEN","BLUE","HAPPY","HEART","HAND","FOOT","EYE","NOSE","FACE","GAME"],
 ru:["ДОМ","КОТ","ЛЕС","ВОДА","ХЛЕБ","НЕБО","РУКА","НОГА","ГЛАЗ","ОКНО","ДРУГ","СТОЛ","СТУЛ","МОРЕ","РЕКА","ДЕНЬ","НОЧЬ","СВЕТ","СЛОВО","ИГРА","ЦВЕТ","ЛИЦО","ЗУБЫ","УХО","ЯЗЫК"],
 ar:["أب","أم","يد","بيت","ماء","خبز","نجم","قمر","شمس","بحر","نور","وقت","يوم","ليل","صوت","لون","عين","أنف","فم","قلب"],
 fr:["UN","LE","EAU","AMI","PAIN","MER","JOUR","NUIT","MOT","JEU","BLEU","VERT","MAIN","PIED","TETE","OEIL","NEZ","BOUCHE","COEUR","FACE"]
};

let level=1, score=0, totalSeconds=0, timer=null;
let levelWords=[], selected=[], used=new Set(), dragging=false, last=null;
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function formatTime(s) {
    let h = Math.floor(s / 3600);
    let m = Math.floor((s % 3600) / 60);
    let sec = s % 60;
    return [h, m, sec].map(v => v < 10 ? "0" + v : v).join(":");
}

function startGame(){
 clearInterval(timer);
 score=0; level=1;
 document.getElementById("score").innerText=0;
 
 let h = parseInt(document.getElementById("hSel").value);
 let m = parseInt(document.getElementById("mSel").value);
 let s = parseInt(document.getElementById("sSel").value);
 totalSeconds = (h * 3600) + (m * 60) + s;

 if(totalSeconds <= 0) { alert("Vaqtni tanlang!"); return; }

 document.getElementById("timeDisplay").innerText = formatTime(totalSeconds);
 timer = setInterval(() => {
  totalSeconds--;
  document.getElementById("timeDisplay").innerText = formatTime(totalSeconds);
  if(totalSeconds <= 0){
      clearInterval(timer);
      alert("Vaqt tugadi! Umumiy ball: " + score);
  }
 }, 1000);
 loadLevel();
}

function loadLevel(){
 resetSelection();
 document.getElementById("level").innerText = level;
 const lang = document.getElementById("lang").value;
 const pool = [...WORDS[lang]];
 
 // LEVEL QIYINLIGI (1-level juda oson)
 let wordCount = 1;
 if(level > 3) wordCount = 2;
 if(level > 10) wordCount = 3;
 if(level > 30) wordCount = 4;
 if(level > 60) wordCount = 5;

 // So'z uzunligini filtrlash
 let filtered = pool.filter(w => {
     if(level < 5) return w.length <= 3;
     if(level < 15) return w.length <= 4;
     if(level < 40) return w.length <= 6;
     return true;
 });

 levelWords = [];
 while(levelWords.length < wordCount && filtered.length > 0){
  let w = filtered[Math.floor(Math.random() * filtered.length)];
  if(!levelWords.includes(w)) levelWords.push(w);
 }
 drawBoard();
 drawWheel(shuffle(levelWords.join("").split("")));
}

function drawBoard(){
 const b = document.getElementById("board");
 b.innerHTML = "";
 levelWords.forEach(w => {
  const d = document.createElement("div");
  d.className = "word";
  d.dataset.word = w;
  for(let i=0; i<w.length; i++) d.appendChild(document.createElement("div")).className = "slot";
  b.appendChild(d);
 });
}

function drawWheel(letters){
 const w = document.getElementById("wheel");
 w.querySelectorAll(".letter").forEach(x => x.remove());
 const r = 100, c = 140;
 letters.forEach((l, i) => {
  const a = 2 * Math.PI / letters.length * i;
  const d = document.createElement("div");
  d.className = "letter";
  d.innerText = l;
  d.style.left = c + r * Math.cos(a) - 25 + "px";
  d.style.top = c + r * Math.sin(a) - 25 + "px";
  
  d.onpointerdown = e => { dragging=true; selected=[]; used.clear(); ctx.clearRect(0,0,280,280); last=null; pick(d,e); };
  d.onpointerenter = e => { if(dragging) pick(d,e); };
  w.appendChild(d);
 });
}

function pick(el, e){
 if(used.has(el)) return;
 used.add(el); el.classList.add("used");
 selected.push(el.innerText);
 
 const rect = canvas.getBoundingClientRect();
 const x = e.clientX - rect.left, y = e.clientY - rect.top;
 
 ctx.strokeStyle = "rgba(255,255,255,0.8)";
 ctx.lineWidth = 6;
 ctx.lineCap = "round";
 
 if(!last){ ctx.beginPath(); ctx.moveTo(x,y); }
 else { ctx.lineTo(x,y); ctx.stroke(); }
 last = {x, y};
}

document.onpointerup = () => { if(dragging) checkWord(); dragging=false; };

function checkWord(){
 const w = selected.join("");
 let anyDone = false;
 document.querySelectorAll(".word").forEach(row => {
  if(row.dataset.word === w && !row.classList.contains("done")){
   row.classList.add("done");
   [...row.children].forEach((s, i) => s.innerText = w[i]);
   score += (w.length * 10);
   document.getElementById("score").innerText = score;
   anyDone = true;
  }
 });
 resetSelection();
 if(document.querySelectorAll(".word.done").length === levelWords.length){
  level++; 
  setTimeout(loadLevel, 600);
 }
}

function resetSelection(){
 selected = []; used.clear(); ctx.clearRect(0,0,280,280);
 document.querySelectorAll(".letter").forEach(l => l.classList.remove("used"));
 last = null; dragging = false;
}

const shuffle = a => a.sort(() => Math.random() - 0.5);
</script>
</body>
</html>

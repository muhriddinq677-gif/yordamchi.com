<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz  game</title>
    <style>
        :root { --primary: #6c5ce7; --danger: #ff7675; --success: #55efc4; }
        body { font-family: sans-serif; margin: 0; background: #dfe6e9; display: flex; flex-direction: column; align-items: center; }
        #game-box { width: 95%; max-width: 600px; background: #fff; margin: 20px 0; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        #track { height: 100px; background: #f0f0f0; border-radius: 50px; position: relative; margin: 20px 0; border: 4px solid #eee; overflow: hidden; }
        #monster, #player { position: absolute; font-size: 40px; top: 20px; transition: left 0.5s ease; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        #quiz { background: #f9f9f9; padding: 20px; border-radius: 15px; min-height: 200px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; cursor: pointer; font-size: 1rem; }
        .flash-red { animation: flashRed 0.3s; }
        @keyframes flashRed { 50% { background: var(--danger); } }
    </style>
</head>
<body>

<div id="game-box">
    <div class="stats">
        <div>Vaqt: <span id="timer">60</span>s</div>
        <div>Ochko: <span id="score">0</span></div>
    </div>
    <div id="track">
        <div id="monster" style="left: 0px;">👾</div>
        <div id="player" style="left: 200px;">🧍</div>
    </div>
    <div id="quiz">
        <h2 id="question">Tayyormisiz?</h2>
        <div class="options" id="options">
            <button class="btn" onclick="startGame()">O'yinni boshlash</button>
        </div>
    </div>
</div>

<script>
const allQuestions = [
    // MATEMATIKA (25 ta)
    {q:"5+7?", a:["11","12","13","10"], c:"12"}, {q:"10-4?", a:["5","6","7","8"], c:"6"},
    {q:"3x4?", a:["10","12","14","15"], c:"12"}, {q:"20/2?", a:["5","10","15","20"], c:"10"},
    {q:"15+15?", a:["25","30","35","40"], c:"30"}, {q:"9-3?", a:["5","6","4","7"], c:"6"},
    {q:"2x8?", a:["14","16","18","12"], c:"16"}, {q:"50-25?", a:["20","25","30","35"], c:"25"},
    {q:"12+8?", a:["18","19","20","21"], c:"20"}, {q:"100/4?", a:["20","25","30","50"], c:"25"},
    {q:"7+8?", a:["14","15","16","13"], c:"15"}, {q:"30-15?", a:["10","15","20","5"], c:"15"},
    {q:"4x5?", a:["15","20","25","30"], c:"20"}, {q:"18/3?", a:["5","6","7","4"], c:"6"},
    {q:"11+9?", a:["19","20","21","22"], c:"20"}, {q:"14-7?", a:["6","7","8","5"], c:"7"},
    {q:"6x3?", a:["15","18","20","12"], c:"18"}, {q:"40/5?", a:["7","8","9","6"], c:"8"},
    {q:"25+5?", a:["28","30","32","35"], c:"30"}, {q:"16-8?", a:["6","7","8","9"], c:"8"},
    {q:"9x2?", a:["16","18","20","14"], c:"18"}, {q:"80/10?", a:["6","7","8","9"], c:"8"},
    {q:"13+7?", a:["18","19","20","21"], c:"20"}, {q:"45-5?", a:["35","40","45","50"], c:"40"},
    {q:"10x10?", a:["90","100","110","1000"], c:"100"},
    // INGLIZ TILI (25 ta)
    {q:"'Apple'?", a:["Olma","Nok","Anor","Behi"], c:"Olma"}, {q:"'Book'?", a:["Daftar","Kitob","Qalam","O'chirg'ich"], c:"Kitob"},
    {q:"'Hello'?", a:["Salom","Xayr","Rahmat","Qalay"], c:"Salom"}, {q:"'Green'?", a:["Ko'k","Qizil","Sariq","Yashil"], c:"Yashil"},
    {q:"'Dog'?", a:["Mushuk","It","Ot","Eshak"], c:"It"}, {q:"'School'?", a:["Maktab","Bog'cha","Uy","Ish"], c:"Maktab"},
    {q:"'Mother'?", a:["Ota","Ona","Aka","Opa"], c:"Ona"}, {q:"'Water'?", a:["Choy","Suv","Sut","Sharbat"], c:"Suv"},
    {q:"'Thank you'?", a:["Salom","Rahmat","Mayli","Yo'q"], c:"Rahmat"}, {q:"'Sun'?", a:["Quyosh","Oy","Yulduz","Yer"], c:"Quyosh"},
    {q:"'Red'?", a:["Qora","Oq","Qizil","Sariq"], c:"Qizil"}, {q:"'Cat'?", a:["It","Mushuk","Sichqon","Ot"], c:"Mushuk"},
    {q:"'Pen'?", a:["Qalam","Ruchka","Sizgich","Daftar"], c:"Ruchka"}, {q:"'Table'?", a:["Stul","Stol","Shkaf","Oyna"], c:"Stol"},
    {q:"'Family'?", a:["Do'stlar","Oila","Qo'shni","Sinf"], c:"Oila"}, {q:"'Morning'?", a:["Ertalab","Kechqurun","Tushlik","Tun"], c:"Ertalab"},
    {q:"'White'?", a:["Qora","Oq","Kulrang","Moviy"], c:"Oq"}, {q:"'Bread'?", a:["Suv","Non","Meva","Yegulik"], c:"Non"},
    {q:"'Sister'?", a:["Opa/Singil","Aka/Uka","Xola","Amma"], c:"Opa/Singil"}, {q:"'Moon'?", a:["Quyosh","Oy","Yulduz","Samo"], c:"Oy"},
    {q:"'Milk'?", a:["Sharbat","Sut","Suv","Qahva"], c:"Sut"}, {q:"'Tree'?", a:["O't","Daraxt","Gul","Barg"], c:"Daraxt"},
    {q:"'Day'?", a:["Tun","Kun","Yil","Hafta"], c:"Kun"}, {q:"'Car'?", a:["Velo","Mashina","Kema","Poyezd"], c:"Mashina"},
    {q:"'Blue'?", a:["Yashil","Ko'k","Sariq","Qizil"], c:"Ko'k"},
    // DASTURLASH (25 ta)
    {q:"HTML nima?", a:["Dastur","Belgilash tili","O'yin","Rasm"], c:"Belgilash tili"}, {q:"Python 'print'?", a:["Chiqarish","O'chirish","Saqlash","Xato"], c:"Chiqarish"},
    {q:"JS nima?", a:["Dizayn","Interaktivlik","Matn","Server"], c:"Interaktivlik"}, {q:"Backend?", a:["Miya","Ko'rinish","Dizayn","Rasm"], c:"Miya"},
    {q:"CSS?", a:["Kod","Dizayn","Ma'lumot","O'yin"], c:"Dizayn"}, {q:"O'zgaruvchi?", a:["Quti","Rasm","Funksiya","Xato"], c:"Quti"},
    {q:"Bug?", a:["Yutuq","Xato","Dastur","Kod"], c:"Xato"}, {q:"Frontend?", a:["Ko'rinish","Baza","Kod","Server"], c:"Ko'rinish"},
    {q:"JS fayli?", a:[".js",".css",".html",".py"], c:".js"}, {q:"Loop?", a:["To'xtash","Takrorlanish","Xato","Rasm"], c:"Takrorlanish"},
    {q:"Dasturchi yozadi?", a:["She'r","Kod","Matn","Rasm"], c:"Kod"}, {q:"Algoritm?", a:["Ketma-ketlik","Tasodif","Rasm","O'yin"], c:"Ketma-ketlik"},
    {q:"Array?", a:["Ro'yxat","Son","Fayl","Xato"], c:"Ro'yxat"}, {q:"URL?", a:["Manzil","Ism","Kod","Rasm"], c:"Manzil"},
    {q:"Database?", a:["Baza","Dizayn","Kod","Rasm"], c:"Baza"}, {q:"If/Else?", a:["Shart","Loop","Fayl","Rasm"], c:"Shart"},
    {q:"Taglar qayerda?", a:["HTML","Excel","Word","Py"], c:"HTML"}, {q:"Boolean?", a:["True/False","Son","Matn","Array"], c:"True/False"},
    {q:"Function?", a:["Amal","Xato","Rang","Dizayn"], c:"Amal"}, {q:"String?", a:["Matn","Son","Belgi","Loop"], c:"Matn"},
    {q:"Integer?", a:["Butun son","Matn","Rasm","Fayl"], c:"Butun son"}, {q:"Click?", a:["Bosish","Yozish","Ko'rish","O'chirish"], c:"Bosish"},
    {q:"Browser?", a:["Chrome","Word","Excel","Py"], c:"Chrome"}, {q:"Python fayli?", a:[".py",".js",".html",".css"], c:".py"},
    {q:"Java?", a:["Til","Kofe","Rasm","O'yin"], c:"Til"}
];

let timeLeft, score, monsterX, playerX, gameActive, gameTimer, monsterMovement, currentQs;

function startGame() {
    gameActive = true; score = 0; timeLeft = 60; monsterX = 0; playerX = 200;
    currentQs = [...allQuestions].sort(() => Math.random() - 0.5);
    document.getElementById('score').innerText = score;
    document.getElementById('timer').innerText = timeLeft;
    clearInterval(gameTimer); clearInterval(monsterMovement);
    gameTimer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft <= 0) endGame(true); }, 1000);
    monsterMovement = setInterval(() => { monsterX += 8; updatePos(); }, 800);
    nextQuestion();
}

function nextQuestion() {
    if(!gameActive) return;
    if(currentQs.length === 0) currentQs = [...allQuestions].sort(() => Math.random() - 0.5);
    const q = currentQs.shift();
    document.getElementById('question').innerText = q.q;
    const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
    q.a.sort(() => Math.random() - 0.5).forEach(opt => {
        const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = opt;
        btn.onclick = () => {
            if(opt === q.c) { score += 10; monsterX -= 60; if(monsterX < 0) monsterX = 0; }
            else { monsterX += 80; document.body.classList.add('flash-red'); setTimeout(()=>document.body.classList.remove('flash-red'), 300); }
            document.getElementById('score').innerText = score; updatePos(); nextQuestion();
        };
        optDiv.appendChild(btn);
    });
}

function updatePos() {
    document.getElementById('monster').style.left = monsterX + "px";
    document.getElementById('player').style.left = playerX + "px";
    if(monsterX >= playerX - 30) endGame(false);
}

function endGame(win) {
    gameActive = false; clearInterval(gameTimer); clearInterval(monsterMovement);
    document.getElementById('question').innerText = win ? "G'ALABA! 🎉" : "YUTQAZDINGIZ! ";
    document.getElementById('options').innerHTML = '<button class="btn" onclick="startGame()">Qayta boshlash</button>';
}
</script>
</body>

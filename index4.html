<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematika o'yini 🔢 🧮</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.game{
  width:100%;
  max-width:420px;
  background:#fff;
  padding:14px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.15);
}
.top{
  display:flex;
  justify-content:space-between;
  font-size:15px;
  margin-bottom:8px;
}
.timer-setup{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.timer-setup input{
  width:100%;
  padding:6px;
  font-size:14px;
}
.timer-setup button{
  padding:6px 10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  text-align:center;
  font-size:18px;
}
.cell{
  background:#eaeaea;
  padding:12px 6px;
  border-radius:8px;
}
.drop{
  background:#fff;
  border:2px dashed #999;
}
.variants{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.variant{
  background:#ddd;
  padding:14px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
.correct{background:#b6f5b6;}
.wrong{background:#f5b6b6;}
@media(min-width:600px){
  .variants{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<body>

<div class="game">
  <div class="timer-setup">
    <input id="h" type="number" min="0" placeholder="soat">
    <input id="m" type="number" min="0" placeholder="minut">
    <input id="s" type="number" min="0" placeholder="sekund">
    <button onclick="startGame()">Start</button>
  </div>

  <div class="top">
    <div>Level: <span id="level">1</span></div>
    <div>⭐ <span id="score">0</span></div>
    <div>⏱ <span id="time">--:--</span></div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="variants" id="variants"></div>
</div>

<script>
let level=1, score=0;
let totalSeconds=0, timer;
let correct={};

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function startGame(){
  const h=+document.getElementById("h").value||0;
  const m=+document.getElementById("m").value||0;
  const s=+document.getElementById("s").value||0;
  totalSeconds=h*3600+m*60+s;
  if(totalSeconds<=0) return alert("Vaqt kiriting");

  clearInterval(timer);
  updateTime();
  timer=setInterval(()=>{
    totalSeconds--;
    updateTime();
    if(totalSeconds<=0){
      clearInterval(timer);
      alert("Vaqt tugadi!");
    }
  },1000);

  generateLevel();
}

function updateTime(){
  let t=totalSeconds;
  let h=Math.floor(t/3600);
  t%=3600;
  let m=Math.floor(t/60);
  let s=t%60;
  document.getElementById("time").textContent=
    `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function generateLevel(){
  const S=rand(30+level*2,60+level*4);
  const A=rand(5,S-5);
  const X=S-A;
  const B=rand(5,S-5);
  const Y=S-B;
  const Z=X+Y;

  correct={x:X,y:Y,z:Z};

  const cells=[
    ".",A,"+","x",S,
    ".",".",".","+",".",
    ".",B,"+","y",S,
    ".",".",".","=",".",
    ".",".",".","z","."
  ];

  renderGrid(cells);
  renderVariants("x");
}

function renderGrid(cells){
  const g=document.getElementById("grid");
  g.innerHTML="";
  cells.forEach(c=>{
    const d=document.createElement("div");
    d.className="cell";
    if(c==="x"||c==="y"||c==="z"){
      d.classList.add("drop");
      d.dataset.key=c;
    }else d.textContent=c==="."?"":c;
    g.appendChild(d);
  });
}

function renderVariants(key){
  const v=document.getElementById("variants");
  v.innerHTML="";
  let set=new Set([correct[key]]);
  while(set.size<4){
    set.add(correct[key]+rand(-5-level,5+level));
  }
  [...set].sort(()=>Math.random()-0.5).forEach(n=>{
    const d=document.createElement("div");
    d.className="variant";
    d.textContent=n;
    d.onclick=()=>check(key,n,d);
    v.appendChild(d);
  });
}

function check(key,val,el){
  if(val===correct[key]){
    score+=10;
    document.getElementById("score").textContent=score;
    document.querySelector(`[data-key="${key}"]`).textContent=val;
    el.classList.add("correct");

    if(key==="x") renderVariants("y");
    else if(key==="y") renderVariants("z");
    else{
      score+=30;
      level++;
      document.getElementById("level").textContent=level;
      setTimeout(generateLevel,500);
    }
  }else{
    el.classList.add("wrong");
    setTimeout(()=>el.classList.remove("wrong"),400);
  }
}
</script>
</body>
</html>

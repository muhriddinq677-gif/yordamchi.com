<div class="course-container">
    <h2>HTML Professional Kursi (30 Dars)</h2>
    
    <div class="lesson">
        <h3>1-dars: Kirish va Dokument Strukturasi</h3>
        <p>Har bir loyiha <code>&lt;!DOCTYPE html&gt;</code> bilan boshlanadi. Bu brauzerga hujjat turini bildiradi. <code>html</code>, <code>head</code> va <code>body</code> asosiy qismlardir.</p>
        <pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang="uz"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;title&gt;Sarlavha&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Salom Dunyo!&lt;/h1&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>
    </div>

    <div class="lesson">
        <h3>2-dars: Sarlavhalar va Paragraflar (h1-h6, p)</h3>
        <p>Sarlavhalar muhimlik darajasiga ko'ra ishlatiladi. h1 eng muhimi, h6 eng kichigi. Paragraflar esa matn bloklari uchun.</p>
        <code>&lt;h1&gt;Mavzu&lt;/h1&gt; \n&lt;p&gt;Bu asosiy matn.&lt;/p&gt;</code>
    </div>

    <div class="lesson">
        <h3>3-dars: Matnni Formatlash (Formatting)</h3>
        <p>Matnni qalin qilish uchun <code>&lt;b&gt;</code> yoki <code>&lt;strong&gt;</code>, kursiv uchun <code>&lt;i&gt;</code> yoki <code>&lt;em&gt;</code> ishlatiladi.</p>
        <code>&lt;strong&gt;Muhim!&lt;/strong&gt; \n&lt;em&gt;Kursiv matn&lt;/em&gt;</code>
    </div>

    <div class="lesson">
        <h3>4-dars: Ro'yxatlar (ul, ol, li)</h3>
        <p>Tartibsiz (nuqtali) va tartibli (raqamlangan) ro'yxatlar yaratish.</p>
        <pre><code>&lt;ul&gt;\n  &lt;li&gt;Olma&lt;/li&gt;\n  &lt;li&gt;Banan&lt;/li&gt;\n&lt;/ul&gt;</code></pre>
    </div>

    <div class="lesson">
        <h3>5-dars: Havolalar (a) va Navigatsiya</h3>
        <p>Boshqa sahifaga o'tish uchun <code>href</code> atributi ishlatiladi.</p>
        <code>&lt;a href="https://google.com" target="_blank"&gt;Googlega o'tish&lt;/a&gt;</code>
    </div>

    <div class="lesson">
        <h3>6-dars: Rasmlar (img) va Multimedia</h3>
        <p>Rasm qo'yishda <code>src</code> (manba) va <code>alt</code> (tavsif) atributlari majburiydir.</p>
        <code>&lt;img src="foto.jpg" alt="Tabiat" width="300"&gt;</code>
    </div>

    <div class="lesson">
        <h3>7-dars: Multimedia: Audio va Video</h3>
        <p>Saytda media pleyerlarni o'rnatish.</p>
        <code>&lt;video controls&gt; &lt;source src="film.mp4"&gt; &lt;/video&gt;</code>
    </div>

    <div class="lesson">
        <h3>8-dars: Jadvallar (Table)</h3>
        <p>Jadvallar <code>tr</code> (qator) va <code>td</code> (katak) lardan tashkil topadi.</p>
        <code>&lt;table border="1"&gt;\n  &lt;tr&gt;&lt;td&gt;Ism&lt;/td&gt;&lt;td&gt;Yosh&lt;/td&gt;&lt;/tr&gt;\n&lt;/table&gt;</code>
    </div>

    <div class="lesson">
        <h3>9-dars: Formalar va Inputlar (Text, Password)</h3>
        <p>Ma'lumot kiritish maydonlari. <code>type</code> orqali turi belgilanadi.</p>
        <code>&lt;input type="text" placeholder="Login"&gt;\n&lt;input type="password"&gt;</code>
    </div>

    <div class="lesson">
        <h3>10-dars: Tanlov elementlari (Checkbox, Radio)</h3>
        <p>Bir nechta variantdan birini yoki bir nechtasini tanlash.</p>
        <code>&lt;input type="checkbox"&gt; Roziman \n&lt;input type="radio" name="jins"&gt; Erkak</code>
    </div>

    <div class="lesson">
        <h3>11-dars: Select, Option va Textarea</h3>
        <p>Pastga tushuvchi ro'yxat va ko'p qatorli matn maydoni.</p>
        <code>&lt;select&gt; &lt;option&gt;Uzb&lt;/option&gt; &lt;/select&gt;\n&lt;textarea&gt;&lt;/textarea&gt;</code>
    </div>

    <div class="lesson">
        <h3>12-dars: Tugmalar va Formani yuborish</h3>
        <p><code>button</code> tegi orqali amalni bajarish.</p>
        <code>&lt;button type="submit"&gt;Yuborish&lt;/button&gt;</code>
    </div>

    <div class="lesson">
        <h3>13-dars: Div va Span (Konteynerlar)</h3>
        <p>Blok (div) va qator (span) elementlari orqali guruhlash.</p>
        <code>&lt;div class="box"&gt;Kontent&lt;/div&gt;</code>
    </div>

    <div class="lesson">
        <h3>14-dars: Atributlar: Class va ID</h3>
        <p>Elementlarga nom berish. ID bitta, Class bir nechta bo'lishi mumkin.</p>
        <code>&lt;p id="birinchi" class="matn"&gt;Salom&lt;/p&gt;</code>
    </div>

    <div class="lesson">
        <h3>15-dars: Semantik HTML: Header, Nav, Footer</h3>
        <p>Sayt qismlarini mantiqiy nomlash.</p>
        <code>&lt;header&gt;Logo&lt;/header&gt;\n&lt;footer&gt;2024&lt;/footer&gt;</code>
    </div>

    <div class="lesson">
        <h3>16-dars: Section va Article</h3>
        <p>Maqolalar va bo'limlarni ajratib ko'rsatish.</p>
        <code>&lt;section&gt;&lt;article&gt;Yangilik&lt;/article&gt;&lt;/section&gt;</code>
    </div>

    <div class="lesson">
        <h3>17-dars: Iframe (Boshqa saytlarni ulash)</h3>
        <p>Sayt ichida xarita yoki videoni ko'rsatish.</p>
        <code>&lt;iframe src="https://google.com"&gt;&lt;/iframe&gt;</code>
    </div>

    <div class="lesson">
        <h3>18-dars: Meta teglar va SEO</h3>
        <p>Qidiruv tizimlari uchun tavsif yozish.</p>
        <code>&lt;meta name="description" content="O'quv kursi"&gt;</code>
    </div>

    <div class="lesson">
        <h3>19-dars: Maxsus belgilar (Entities)</h3>
        <p>HTMLda yozib bo'lmaydigan belgilarni kod orqali yozish.</p>
        <code>&amp;copy; - mualliflik huquqi, &amp;lt; - kichik belgisi</code>
    </div>

    <div class="lesson">
        <h3>20-dars: Favicon qo'shish</h3>
        <p>Brauzer tepasiga logotip o'rnatish.</p>
        <code>&lt;link rel="icon" href="logo.png"&gt;</code>
    </div>

    <div class="lesson">
        <h3>21-dars: HTML Izohlar (Comments)</h3>
        <p>Kod orasiga tushuntirish yozish.</p>
        <code>&lt;!-- Bu kod brauzerda ko'rinmaydi --&gt;</code>
    </div>

    <div class="lesson">
        <h3>22-dars: Details va Summary</h3>
        <p>Yopilib-ochiladigan matn yaratish.</p>
        <code>&lt;details&gt; &lt;summary&gt;Batafsil&lt;/summary&gt; Matn... &lt;/details&gt;</code>
    </div>

    <div class="lesson">
        <h3>23-dars: Progress va Meter</h3>
        <p>Yuklanish darajasini ko'rsatish.</p>
        <code>&lt;progress value="50" max="100"&gt;&lt;/progress&gt;</code>
    </div>

    <div class="lesson">
        <h3>24-dars: HTML Form Validation</h3>
        <p>Inputlarni to'ldirishni majburiy qilish.</p>
        <code>&lt;input type="text" required&gt;</code>
    </div>

    <div class="lesson">
        <h3>25-dars: Marquee (Harakatlanuvchi matn)</h3>
        <p>Matnni harakatga keltirish (eskirgan lekin qiziq).</p>
        <code>&lt;marquee&gt;Xush kelibsiz!&lt;/marquee&gt;</code>
    </div>

    <div class="lesson">
        <h3>26-dars: Script va Link ulanishi</h3>
        <p>JS va CSS fayllarini HTMLga ulash.</p>
        <code>&lt;script src="script.js"&gt;&lt;/script&gt;</code>
    </div>

    <div class="lesson">
        <h3>27-dars: SVG bilan ishlash</h3>
        <p>Vektorli grafikalarni kod orqali chizish.</p>
        <code>&lt;svg&gt;&lt;circle r="50" fill="red" /&gt;&lt;/svg&gt;</code>
    </div>

    <div class="lesson">
        <h3>28-dars: HTML5 yangi input turlari</h3>
        <p>Color, Date, Range kabi zamonaviy turlar.</p>
        <code>&lt;input type="date"&gt; \n&lt;input type="range"&gt;</code>
    </div>

    <div class="lesson">
        <h3>29-dars: Global atributlar</h3>
        <p>title, style, hidden kabi hamma tegda ishlaydigan atributlar.</p>
        <code>&lt;div hidden&gt;Ko'rinmas blok&lt;/div&gt;</code>
    </div>

    <div class="lesson">
        <h3>30-dars: Yakuniy loyiha strukturasi</h3>
        <p>Barcha bilimlarni jamlab, bitta portfolio sahifasini yaratamiz.</p>
    </div>
</div>

    <div class="lesson">

    </div>

    <div class="lesson">
        <h3>3-dars: Box Model: Padding (Ichki masofa)</h3>
        <p>Element chegarasi va kontent orasidagi masofa.</p>
        <code>padding: 10px 20px;</code>

    <div class="lesson">
        <h3>4-dars: Box Model: Margin (Tashqi masofa)</h3>

    <div class="lesson">

        <code>border: 1px solid black; \nborder-radius: 10px;</code>

    <div class="lesson">
        <h3>6-dars: Width, Height va Max/Min</h3>

    <div class="lesson">
        <h3>7-dars: Text Align va Decoration</h3>
        <p>Matnni tekislash va ostidagi chiziqni olib tashlash.</p>
        <code>text-align: center; \ntext-decoration: none;</code>
    </div>

    <div class="lesson">
        <h3>8-dars: Display: Block va Inline</h3>
        <p>Elementlarni blok yoki qator ko'rinishiga keltirish.</p>
        <code>display: block; \ndisplay: inline-block;</code>
    </div>

    <div class="lesson">
        <h3>9-dars: Position: Relative va Absolute</h3>
        <p>Elementlarni erkin joylashtirish (Koordinatalar orqali).</p>

    <div class="lesson">
        <h3>10-dars: Position: Fixed va Sticky</h3>

        <code>position: fixed; \ntop: 0;</code>
    </div>

    <div class="lesson">
        <h3>11-dars: Z-index (Qavatlar)</h3>
        <p>Elementlarning bir-birining ustida chiqish tartibi.</p>
        <code>z-index: 10;</code>
    </div>

    <div class="lesson">
        <h3>12-dars: Overflow (Suyuqlik)</h3>
        <p>Element ichiga sig'magan matnni boshqarish.</p>
        <code>overflow: hidden; \noverflow-y: scroll;</code>
    </div>

    <div class="lesson">
        <h3>13-dars: Box Shadow va Text Shadow</h3>
        <p>Elementlarga va matnlarga soya berish.</p>
        <code>box-shadow: 2px 2px 10px gray;</code>
    </div>

    <div class="lesson">
        <h3>14-dars: Opacity va Visibility</h3>
        <p>Elementlarni shaffof qilish yoki yashirish.</p>
        <code>opacity: 0.5; \nvisibility: hidden;</code>
    </div>

    <div class="lesson">
        <h3>15-dars: Float va Clear</h3>
        <p>Elementlarni o'ng/chapga surish (eski usul).</p>
        <code>float: left; \nclear: both;</code>
    </div>

    <div class="lesson">

        <p>Zamonaviy joylashtirish tizimi.</p>
        <code>display: flex; \njustify-content: space-between;</code>
    </div>

    <div class="lesson">
        <h3>17-dars: Flexbox: Align Items</h3>
        <p>Elementlarni vertikal markazlash.</p>
        <code>align-items: center;</code>
    </div>

    <div class="lesson">
        <h3>18-dars: Flexbox: Wrap va Direction</h3>
        <p>Elementlarni qatorga sig'masa pastga tushirish.</p>
        <code>flex-wrap: wrap; \nflex-direction: column;</code>
    </div>

    <div class="lesson">
        <h3>19-dars: CSS Grid: Kirish</h3>
        <p>To'liq setka (grid) tizimini yaratish.</p>
        <code>display: grid; \ngrid-template-columns: 1fr 1fr;</code>
    </div>

    <div class="lesson">
        <h3>20-dars: Grid Gap va Areas</h3>
        <p>Setkalar orasidagi masofa.</p>
        <code>gap: 20px;</code>
    </div>

    <div class="lesson">
        <h3>21-dars: CSS Media Queries (Adaptivlik)</h3>
        <p>Saytni mobil qurilmalarga moslash.</p>
        <code>@media (max-width: 768px) { ... }</code>
    </div>

    <div class="lesson">
        <h3>22-dars: CSS Transitions</h3>
        <p>Stillar o'zgarishini silliq qilish.</p>
        <code>transition: all 0.3s ease;</code>
    </div>

    <div class="lesson">

        <p>Elementni aylantirish, kattalashtirish va surish.</p>

    </div>

    <div class="lesson">

        <p>O'zimiz mustaqil animatsiya yaratamiz.</p>
        <code>@keyframes yurish { from {left:0;} to {left:100px;} }</code>

        <h3>Урок 2: Заголовки и параграфы (h1-h6, p)</h3>

        <code>&lt;h1&gt;Тема&lt;/h1&gt; \n&lt;p&gt;Это основной текст.&lt;/p&gt;</code>

        <code>&lt;strong&gt;Важно!&lt;/strong&gt; \n&lt;em&gt;Курсивный текст&lt;/em&gt;</code>
    </div>

    <div class="lesson">
        <h3>Урок 4: Списки (ul, ol, li)</h3>
        <p>Маркированные (ul) и нумерованные (ol) списки.</p>
        <pre><code>&lt;ul&gt;\n  &lt;li&gt;Яблоко&lt;/li&gt;\n  &lt;li&gt;Банан&lt;/li&gt;\n&lt;/ul&gt;</code></pre>

    <div class="lesson">

    <div class="lesson">

"css": `
<div class="course-container">
    <h2>Профессиональный курс CSS (30 уроков)</h2>

    <div class="lesson">
        <h3>Урок 1: Цвета и фон (Colors & Background)</h3>
        <p>Цвета в форматах HEX, RGB и HSL. Установка фона и картинок.</p>
        <code>color: red; \nbackground-color: #f1f1f1; \nbackground-image: url('bg.jpg');</code>
    </div>

    <div class="lesson">
        <h3>Урок 2: Шрифты (Typography)</h3>
        <p>Управление размером, стилем и жирностью текста.</p>
        <code>font-size: 20px; \nfont-family: Arial; \nfont-weight: bold;</code>
    </div>

    <div class="lesson">
        <h3>Урок 3: Box Model: Padding (Внутренний отступ)</h3>
        <p>Расстояние между рамкой элемента и его контентом.</p>
        <code>padding: 10px 20px;</code>
    </div>

    <div class="lesson">
        <h3>Урок 4: Box Model: Margin (Внешний отступ)</h3>
        <p>Создание пространства между соседними элементами.</p>
        <code>margin: 0 auto; (Выравнивание по центру)</code>
    </div>

    <div class="lesson">
        <h3>Урок 5: Border и Border-radius</h3>
        <p>Рамка элемента и скругление углов.</p>
        <code>border: 1px solid black; \nborder-radius: 10px;</code>
    </div>

    <div class="lesson">
        <h3>Урок 6: Width, Height и Max/Min размеры</h3>
        <p>Задание размеров в пикселях и процентах.</p>
        <code>width: 100%; \nmax-width: 1200px;</code>
    </div>

    <div class="lesson">
        <h3>Урок 7: Text Align и Decoration</h3>
        <p>Выравнивание текста и удаление подчеркивания ссылок.</p>
        <code>text-align: center; \ntext-decoration: none;</code>
    </div>

    <div class="lesson">
        <h3>Урок 8: Display: Block и Inline</h3>
        <p>Изменение типа отображения элементов (блочный или строчный).</p>
        <code>display: block; \ndisplay: inline-block;</code>
    </div>

    <div class="lesson">
        <h3>Урок 9: Position: Relative и Absolute</h3>
        <p>Свободное позиционирование элементов по координатам.</p>
        <code>position: absolute; \ntop: 20px; \nleft: 50px;</code>
    </div>

    <div class="lesson">
        <h3>Урок 10: Position: Fixed и Sticky</h3>
        <p>Фиксированные меню и заголовки, липнущие при скролле.</p>
        <code>position: fixed; \ntop: 0;</code>
    </div>

    <div class="lesson">
        <h3>Урок 11: Z-index (Слои)</h3>
        <p>Порядок наложения элементов друг на друга.</p>
        <code>z-index: 10;</code>
    </div>

    <div class="lesson">
        <h3>Урок 12: Overflow (Переполнение)</h3>
        <p>Управление контентом, который не помещается в элемент.</p>
        <code>overflow: hidden; \noverflow-y: scroll;</code>
    </div>

    <div class="lesson">
        <h3>Урок 13: Box Shadow и Text Shadow</h3>
        <p>Добавление теней элементам и тексту.</p>
        <code>box-shadow: 2px 2px 10px gray;</code>
    </div>

    <div class="lesson">
        <h3>Урок 14: Opacity и Visibility</h3>
        <p>Прозрачность и скрытие элементов.</p>
        <code>opacity: 0.5; \nvisibility: hidden;</code>
    </div>

    <div class="lesson">
        <h3>Урок 15: Float и Clear</h3>
        <p>Обтекание элементов текстом (старый метод верстки).</p>
        <code>float: left; \nclear: both;</code>
    </div>

    <div class="lesson">
        <h3>Урок 16: Flexbox: Введение</h3>
        <p>Современная система гибкой верстки.</p>
        <code>display: flex; \njustify-content: space-between;</code>
    </div>

    <div class="lesson">
        <h3>Урок 17: Flexbox: Align Items</h3>
        <p>Вертикальное выравнивание элементов внутри флекс-контейнера.</p>
        <code>align-items: center;</code>
    </div>

    <div class="lesson">
        <h3>Урок 18: Flexbox: Wrap и Direction</h3>
        <p>Перенос элементов на новую строку и направление осей.</p>
        <code>flex-wrap: wrap; \nflex-direction: column;</code>
    </div>

    <div class="lesson">
        <h3>Урок 19: CSS Grid: Введение</h3>
        <p>Создание полноценных сеток (гридов).</p>
        <code>display: grid; \ngrid-template-columns: 1fr 1fr;</code>
    </div>

    <div class="lesson">
        <h3>Урок 20: Grid Gap и Areas</h3>
        <p>Расстояние между ячейками сетки.</p>
        <code>gap: 20px;</code>
    </div>

    <div class="lesson">
        <h3>Урок 21: CSS Media Queries (Адаптивность)</h3>
        <p>Настройка сайта под мобильные устройства.</p>
        <code>@media (max-width: 768px) { ... }</code>
    </div>

    <div class="lesson">
        <h3>Урок 22: CSS Transitions</h3>
        <p>Плавное изменение стилей при наведении или клике.</p>
        <code>transition: all 0.3s ease;</code>
    </div>

    <div class="lesson">
        <h3>Урок 23: CSS Transforms</h3>
        <p>Поворот, масштабирование и наклон элементов.</p>
        <code>transform: rotate(45deg) scale(1.2);</code>
    </div>

    <div class="lesson">
        <h3>Урок 24: CSS Keyframes Анимация</h3>
        <p>Создание собственных сложных анимаций.</p>
        <code>@keyframes move { from {left:0;} to {left:100px;} }</code>
    </div>

    <div class="lesson">
        <h3>Урок 25: Псевдоклассы (:hover, :active)</h3>
        <p>Стили для состояний элементов при взаимодействии.</p>
        <code>a:hover { color: orange; }</code>
    </div>

    <div class="lesson">
        <h3>Урок 26: Псевдоэлементы (:before, :after)</h3>
        <p>Добавление контента до или после элемента через CSS.</p>
        <code>.box::before { content: '★'; }</code>
    </div>

    <div class="lesson">
        <h3>Урок 27: CSS Переменные (Variables)</h3>
        <p>Хранение значений цветов и размеров в одном месте.</p>
        <code>:root { --main-color: blue; } \ncolor: var(--main-color);</code>
    </div>

    <div class="lesson">
        <h3>Урок 28: Object-fit (Стилизация картинок)</h3>
        <p>Как картинки вписываются в свои контейнеры.</p>
        <code>object-fit: cover;</code>
    </div>

    <div class="lesson">
        <h3>Урок 29: CSS Filters</h3>
        <p>Эффекты фильтров (размытие, черно-белое) для картинок.</p>
        <code>filter: blur(5px) grayscale(100%);</code>

    <div class="lesson">
        <h3>Урок 30: Итоговый проект: Полный дизайн страницы</h3>
        <p>Используем Flex, Grid и анимации для создания целого сайта.</p>
    </div>
</div>
`

<div class="course-container">
    <h2>Professional HTML Course (30 Lessons)</h2>
    
    <div class="lesson">
        <h3>Lesson 1: Introduction and Document Structure</h3>
        <p>Every project starts with <code>&lt;!DOCTYPE html&gt;</code>. Key parts: <code>html</code>, <code>head</code>, and <code>body</code>.</p>
        <pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang="en"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;title&gt;Page Title&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;h1&gt;Hello World!&lt;/h1&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre>
    </div>

    <div class="lesson">
        <h3>Lesson 2: Headings and Paragraphs (h1-h6, p)</h3>
        <p>Headings define the hierarchy of importance. h1 is the most important, p is for text blocks.</p>
        <code>&lt;h1&gt;Subject&lt;/h1&gt; \n&lt;p&gt;This is the main text.&lt;/p&gt;</code>
    </div>

    <div class="lesson">

    </div>

    <div class="lesson">
        <h3>Lesson 4: Lists (ul, ol, li)</h3>
        <p>Unordered (bulleted) and ordered (numbered) lists.</p>

function setLang(l){
currentLang=l;
document.querySelectorAll("[data-key]").forEach(el=>{
let key=el.getAttribute("data-key");
el.innerText=lang[l][key];
});
showContent("home");
}

function showContent(type){
let c=document.getElementById("content");

if(type==="home"){
c.innerHTML=`
<h1>${lang[currentLang]["main-title"]}</h1>
<h3>${lang[currentLang]["main-sub"]}</h3>
`;
return;
}

c.innerHTML=lang[currentLang][type];
}

function showSettings(){document.getElementById("settings").style.display="block";}
function hideSettings(){document.getElementById("settings").style.display="none";}

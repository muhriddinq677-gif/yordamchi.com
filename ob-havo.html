<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-blue: #0EA5E9;
    --primary-dark: #0369A1;
    --accent-gold: #FBBF24;
    --accent-green: #10B981;
    --bg-light: #F8FAFC;
    --bg-white: #FFFFFF;
    --text-dark: #1F2937;
    --text-light: #6B7280;
    --border-light: #E5E7EB;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    --radius: 12px;
    --font-display: 'Playfair Display', serif;
    --font-heading: 'Poppins', sans-serif;
    --font-body: 'Inter', sans-serif;
}

body {
    font-family: var(--font-body);
    background: linear-gradient(135deg, #F0F9FF 0%, #F8FAFC 100%);
    color: var(--text-dark);
    line-height: 1.6;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
}

/* Header */
.header {
    background: var(--bg-white);
    box-shadow: var(--shadow-md);
    padding: 1.5rem 0;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--primary-blue);
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
}

.logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.logo-title {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--primary-blue);
    font-weight: 700;
}

.logo-subtitle {
    font-size: 0.875rem;
    color: var(--text-light);
    font-family: var(--font-heading);
}

.header-controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
}

.search-box {
    display: flex;
    gap: 0.5rem;
    background: var(--bg-light);
    border-radius: var(--radius);
    padding: 0.5rem;
    border: 1px solid var(--border-light);
}

.search-input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 0.5rem;
    font-family: var(--font-body);
    color: var(--text-dark);
    min-width: 150px;
}

.search-input::placeholder {
    color: var(--text-light);
}

.search-btn {
    background: var(--primary-blue);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.3s ease;
}

.search-btn:hover {
    background: var(--primary-dark);
}

.language-selector {
    display: flex;
    align-items: center;
}

.lang-select {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    background: var(--bg-white);
    color: var(--text-dark);
    font-family: var(--font-body);
    cursor: pointer;
    transition: border-color 0.3s ease;
}

.lang-select:hover {
    border-color: var(--primary-blue);
}

/* Main Content */
.main-content {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    margin-bottom: 3rem;
}

/* Weather Section */
.weather-section {
    margin-bottom: 2rem;
}

.weather-card {
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: var(--shadow-md);
    border-left: 4px solid var(--primary-blue);
}

.location-info {
    margin-bottom: 1.5rem;
}

.location-name {
    font-family: var(--font-display);
    font-size: 2.5rem;
    color: var(--primary-blue);
    margin-bottom: 0.5rem;
}

.current-date {
    color: var(--text-light);
    font-size: 0.95rem;
}

.weather-display {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: center;
}

.temperature-display {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.temperature {
    font-size: 4rem;
    font-weight: 700;
    color: var(--primary-blue);
    font-family: var(--font-heading);
}

.weather-icon {
    font-size: 4rem;
}

.weather-details {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.condition {
    font-size: 1.25rem;
    color: var(--text-dark);
    font-family: var(--font-heading);
    font-weight: 600;
}

.details-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
}

.detail-item {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.detail-label {
    font-size: 0.875rem;
    color: var(--text-light);
    font-weight: 500;
}

.detail-value {
    font-size: 1.125rem;
    color: var(--text-dark);
    font-weight: 600;
}

/* Sun Times Section */
.sun-times-section {
    margin-bottom: 2rem;
}

.section-title {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    color: var(--text-dark);
    margin-bottom: 1.5rem;
    font-weight: 600;
}

.sun-times-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
}

.sun-time-card {
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.sun-time-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.sun-time-card.sunrise {
    border-top: 3px solid var(--accent-gold);
}

.sun-time-card.sunset {
    border-top: 3px solid var(--accent-green);
}

.sun-time-icon {
    font-size: 2.5rem;
}

.sun-time-info {
    display: flex;
    flex-direction: column;
}

.sun-time-label {
    font-size: 0.875rem;
    color: var(--text-light);
    font-weight: 500;
}

.sun-time-value {
    font-size: 1.5rem;
    color: var(--text-dark);
    font-weight: 700;
    font-family: var(--font-heading);
}

/* Forecast Section */
.forecast-section {
    margin-bottom: 2rem;
}

.forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
}

.forecast-card {
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow-md);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
}

.forecast-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
}

.forecast-day {
    font-family: var(--font-heading);
    font-size: 0.95rem;
    color: var(--text-light);
    margin-bottom: 0.5rem;
    font-weight: 600;
}

.forecast-date {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-bottom: 1rem;
}

.forecast-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

.forecast-temps {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
}

.forecast-max {
    color: var(--primary-blue);
    font-weight: 700;
}

.forecast-min {
    color: var(--text-light);
}

.forecast-condition {
    font-size: 0.85rem;
    color: var(--text-light);
    margin-bottom: 0.5rem;
}

.forecast-details {
    font-size: 0.75rem;
    color: var(--text-light);
    display: flex;
    justify-content: center;
    gap: 0.5rem;
}

/* Ramadan Section */
.ramadan-section {
    margin-bottom: 2rem;
}

.tabs {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border-light);
}

.tab-btn {
    padding: 0.75rem 1.5rem;
    border: none;
    background: transparent;
    color: var(--text-light);
    font-family: var(--font-heading);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
}

.tab-btn.active {
    color: var(--primary-blue);
    border-bottom-color: var(--primary-blue);
}

.tab-btn:hover {
    color: var(--primary-blue);
}

.prayers-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
}

.prayer-card {
    background: var(--bg-white);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow-md);
    border-left: 4px solid var(--accent-green);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.prayer-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.prayer-title {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    color: var(--primary-blue);
    margin-bottom: 1rem;
    font-weight: 600;
}

.prayer-text {
    font-size: 1rem;
    color: var(--text-dark);
    line-height: 1.8;
    font-style: italic;
    background: var(--bg-light);
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 0.5rem;
}

.prayer-translation {
    font-size: 0.9rem;
    color: var(--text-light);
    line-height: 1.6;
}

/* Footer */
.footer {
    background: var(--bg-white);
    border-top: 1px solid var(--border-light);
    padding: 2rem;
    text-align: center;
    color: var(--text-light);
    margin-top: 3rem;
}

/* Animations */
@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.weather-card,
.sun-time-card,
.forecast-card,
.prayer-card {
    animation: slideInUp 0.5s ease-out;
}

/* Responsive Design */
@media (max-width: 768px) {
    .header-content {
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
    }

    .logo-title {
        font-size: 1.5rem;
    }

    .weather-display {
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    .temperature {
        font-size: 3rem;
    }

    .details-grid {
        grid-template-columns: 1fr;
    }

    .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }

    .prayers-container {
        grid-template-columns: 1fr;
    }

    .location-name {
        font-size: 1.75rem;
    }

    .section-title {
        font-size: 1.25rem;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 0 0.75rem;
    }

    .header {
        padding: 1rem 0;
        margin-bottom: 1rem;
    }

    .logo-title {
        font-size: 1.25rem;
    }

    .weather-card {
        padding: 1rem;
    }

    .temperature {
        font-size: 2.5rem;
    }

    .weather-icon {
        font-size: 2.5rem;
    }

    .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    }

    .tabs {
        flex-wrap: wrap;
    }

    .tab-btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
    }
}

</style>

let currentLanguage = 'uz';
let currentTab = 'iftar';

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    updateLanguage('uz');
    displayWeather(mockWeatherData);
    displayForecast(mockWeatherData.forecast);
    displayPrayers('iftar');
    setupEventListeners();
    
    // Auto-load weather for user's location
    loadUserLocation();

// Load weather for user's geolocation
function loadUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude } = position.coords;
                fetchWeatherByCoords(latitude, longitude);
            },
            (error) => {
                console.log('Geolocation error:', error);
                // Use default location if geolocation fails
            }
        );
    }
}

// Fetch weather by coordinates
async function fetchWeatherByCoords(lat, lon) {
    try {
        const weatherResponse = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&forecast_days=7`
        );
        
        if (!weatherResponse.ok) throw new Error('Ob-havo ma\'lumotlari topilmadi');
        
        const weatherData = await weatherResponse.json();
        
        // Get location name using reverse geocoding
        const geoResponse = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        
        let locationName = 'Unknown';
        if (geoResponse.ok) {
            const geoData = await geoResponse.json();
            locationName = geoData.address?.city || geoData.address?.town || geoData.address?.village || 'Unknown';
        }
        
        const location = {
            name: locationName,
            lat: lat,
            lon: lon
        };
        
        const processedData = processWeatherData(location, weatherData);
        displayWeather(processedData);
        displayForecast(processedData.forecast);
    } catch (error) {
        console.error('Error fetching weather:', error);
    }
}

// Event Listeners
function setupEventListeners() {
    const languageSelect = document.getElementById('languageSelect');
    const searchBtn = document.getElementById('searchBtn');
    const locationInput = document.getElementById('locationInput');
    const tabButtons = document.querySelectorAll('.tab-btn');

    languageSelect.addEventListener('change', (e) => {
        currentLanguage = e.target.value;
        updateLanguage(currentLanguage);
    });

    searchBtn.addEventListener('click', () => {
        const location = locationInput.value;
        if (location.trim()) {
            searchWeather(location);
        }
    });

    locationInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });

    tabButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            displayPrayers(currentTab);
        });
    });
}

// Search weather by location
async function searchWeather(locationName) {
    try {
        const searchBtn = document.getElementById('searchBtn');
        searchBtn.disabled = true;
        searchBtn.textContent = '⏳ Qidirilmoqda...';
        
        // Use OpenStreetMap Nominatim for geocoding
        const geoResponse = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationName)}&format=json&limit=1`
        );
        
        if (!geoResponse.ok) throw new Error('Shahar topilmadi');
        
        const geoData = await geoResponse.json();
        if (!geoData || geoData.length === 0) {
            alert(`"${locationName}" shahar topilmadi. Boshqa nom bilan urinib ko'ring.`);
            searchBtn.disabled = false;
            searchBtn.textContent = '🔍';
            return;
        }
        
        const location = geoData[0];
        const lat = parseFloat(location.lat);
        const lon = parseFloat(location.lon);
        
        // Fetch weather data using Open-Meteo API
        const weatherResponse = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto&forecast_days=7`
        );
        
        if (!weatherResponse.ok) throw new Error('Ob-havo ma\'lumotlari topilmadi');
        
        const weatherData = await weatherResponse.json();
        
        // Process and display the data
        const processedData = processWeatherData(location, weatherData);
        displayWeather(processedData);
        displayForecast(processedData.forecast);
        
        searchBtn.disabled = false;
        searchBtn.textContent = '🔍';
    } catch (error) {
        console.error('Xatolik:', error);
        alert(`Xatolik: ${error.message}`);
        const searchBtn = document.getElementById('searchBtn');
        searchBtn.disabled = false;
        searchBtn.textContent = '🔍';
    }
}

// Process weather data from Open-Meteo API
function processWeatherData(location, data) {
    const current = data.current;
    const daily = data.daily;
    
    // Get weather condition text
    const conditionText = getWeatherCondition(current.weather_code);
    const weatherIcon = getWeatherEmoji(current.weather_code);
    
    // Process forecast
    const forecast = [];
    for (let i = 0; i < 7; i++) {
        const date = new Date(daily.time[i]);
        const sunrise = new Date(daily.sunrise[i]);
        const sunset = new Date(daily.sunset[i]);
        
        forecast.push({
            date: date,
            maxTemp: Math.round(daily.temperature_2m_max[i]),
            minTemp: Math.round(daily.temperature_2m_min[i]),
            condition: getWeatherCondition(daily.weather_code[i]),
            icon: getWeatherEmoji(daily.weather_code[i]),
            humidity: current.relative_humidity_2m,
            windSpeed: Math.round(current.wind_speed_10m),
            sunrise: formatTimeFromDate(sunrise),
            sunset: formatTimeFromDate(sunset)
        });
    }
    
    return {
        location: {
            name: location.name || location.display_name.split(',')[0],
            country: location.address?.country || 'Unknown',
            latitude: parseFloat(location.lat),
            longitude: parseFloat(location.lon)
        },
        current: {
            temp: Math.round(current.temperature_2m),
            feelsLike: Math.round(current.temperature_2m - 2),
            condition: conditionText,
            humidity: current.relative_humidity_2m,
            windSpeed: Math.round(current.wind_speed_10m),
            icon: weatherIcon
        },
        forecast: forecast,
        sun: {
            sunrise: formatTimeFromDate(new Date(daily.sunrise[0])),
            sunset: formatTimeFromDate(new Date(daily.sunset[0]))
        }
    };
}

// Get weather condition text from WMO code
function getWeatherCondition(code) {
    const conditions = {
        0: 'Clear sky',
        1: 'Mainly clear',
        2: 'Partly cloudy',
        3: 'Overcast',
        45: 'Foggy',
        48: 'Foggy',
        51: 'Light drizzle',
        53: 'Moderate drizzle',
        55: 'Dense drizzle',
        61: 'Slight rain',
        63: 'Moderate rain',
        65: 'Heavy rain',
        71: 'Slight snow',
        73: 'Moderate snow',
        75: 'Heavy snow',
        77: 'Snow grains',
        80: 'Slight rain showers',
        81: 'Moderate rain showers',
        82: 'Violent rain showers',
        85: 'Slight snow showers',
        86: 'Heavy snow showers',
        95: 'Thunderstorm',
        96: 'Thunderstorm with hail',
        99: 'Thunderstorm with hail'
    };
    return conditions[code] || 'Unknown';
}

// Get weather emoji from WMO code
function getWeatherEmoji(code) {
    if (code === 0) return '☀️';
    if (code === 1 || code === 2) return '🌤️';
    if (code === 3) return '☁️';
    if (code === 45 || code === 48) return '🌫️';
    if (code >= 51 && code <= 67) return '🌧️';
    if (code >= 71 && code <= 86) return '❄️';
    if (code >= 95 && code <= 99) return '⛈️';
    return '🌤️';
}

// Format time from Date object
function formatTimeFromDate(date) {
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${hours}:${minutes}`;
}

// Update language
function updateLanguage(lang) {
    currentLanguage = lang;
    const t = translations[lang];
    
    document.getElementById('locationInput').placeholder = t.searchPlaceholder;
    document.getElementById('currentDate').textContent = t.currentDate(new Date());
    
    // Update tab labels
    const tabBtns = document.querySelectorAll('.tab-btn');
    if (tabBtns[0]) tabBtns[0].textContent = t.iftarTab;
    if (tabBtns[1]) tabBtns[1].textContent = t.sahurTab;
    
    // Update section titles
    const titles = document.querySelectorAll('.section-title');
    if (titles[0]) titles[0].textContent = '☀️ Quyosh Vaqtlari';
    if (titles[1]) titles[1].textContent = `📅 ${t.forecast}`;
    if (titles[2]) titles[2].textContent = `🌙 ${t.prayers}`;
    
    // Update detail labels
    const detailLabels = document.querySelectorAll('.detail-label');
    if (detailLabels[0]) detailLabels[0].textContent = t.feelsLike;
    if (detailLabels[1]) detailLabels[1].textContent = t.humidity;
    if (detailLabels[2]) detailLabels[2].textContent = t.windSpeed;
    
    // Update sun time labels
    const sunTimeLabels = document.querySelectorAll('.sun-time-label');
    if (sunTimeLabels[0]) sunTimeLabels[0].textContent = t.sunrise;
    if (sunTimeLabels[1]) sunTimeLabels[1].textContent = t.sunset;
    
    // Redisplay prayers with new language
    displayPrayers(currentTab);
}

// Display current weather
function displayWeather(data) {
    document.getElementById('locationName').textContent = data.location.name;
    document.getElementById('currentTemp').textContent = `${data.current.temp}°C`;
    document.getElementById('weatherIcon').textContent = data.current.icon;
    document.getElementById('weatherCondition').textContent = data.current.condition;
    document.getElementById('feelsLike').textContent = `${data.current.feelsLike}°C`;
    document.getElementById('humidity').textContent = `${data.current.humidity}%`;
    document.getElementById('windSpeed').textContent = `${data.current.windSpeed} km/h`;
    document.getElementById('sunriseTime').textContent = data.sun.sunrise;
    document.getElementById('sunsetTime').textContent = data.sun.sunset;
    document.getElementById('currentDate').textContent = translations[currentLanguage].currentDate(new Date());
}

// Display 7-day forecast
function displayForecast(forecast) {
    const forecastGrid = document.getElementById('forecastGrid');
    forecastGrid.innerHTML = '';

    forecast.forEach(day => {
        const dayOfWeek = getDayName(day.date, currentLanguage);
        const dateStr = day.date.getDate();
        
        const card = document.createElement('div');
        card.className = 'forecast-card';
        card.innerHTML = `
            <div class="forecast-day">${dayOfWeek}</div>
            <div class="forecast-date">${dateStr}</div>
            <div class="forecast-icon">${day.icon}</div>
            <div class="forecast-temps">
                <span class="forecast-max">${day.maxTemp}°</span>
                <span class="forecast-min">${day.minTemp}°</span>
            </div>
            <div class="forecast-condition">${day.condition}</div>
            <div class="forecast-details">
                <span>💧 ${day.humidity}%</span>
                <span>💨 ${day.windSpeed}km/h</span>
            </div>
        `;
        forecastGrid.appendChild(card);
    });
}

// Display prayers
function displayPrayers(tab) {
    const prayersContainer = document.getElementById('prayersContainer');
    prayersContainer.innerHTML = '';

    const prayers = ramadanPrayers[currentLanguage][tab] || [];
    
    prayers.forEach(prayer => {
        const card = document.createElement('div');
        card.className = 'prayer-card';
        card.innerHTML = `
            <div class="prayer-title">${prayer.title}</div>
            <div class="prayer-text">${prayer.text}</div>
        `;
        prayersContainer.appendChild(card);
    });
}

// Helper function to get day name
function getDayName(date, lang) {
    const daysUz = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];
    const daysRu = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    const daysTj = ['Sun', 'Mon', 'Thu', 'Wed', 'Tue', 'Fri', 'Sat'];
    
    const dayIndex = date.getDay();
    if (lang === 'ru') return daysRu[dayIndex];
    if (lang === 'en') return daysTj[dayIndex];
    return daysUz[dayIndex];
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="q1aUDRimK24jskzTE1mep50j8g4U3MMoDWpPu59ns0Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Magic Heart Animation</title>
    <style>
        /* Google Font importi */
        @import url('https://fonts.googleapis.com');
        
        body { 
            margin: 0; 
            background-color: black; 
            overflow: hidden; 
            font-family: 'Dancing Script', cursive; 
        }

        canvas { 
            display: block; 
        }

        #welcome-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 4rem; /* Matn uzunligi uchun biroz kichraytirildi */
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            text-shadow: 0 0 10px #f73487, 0 0 20px #f73487, 0 0 40px #f73487;
            white-space: nowrap;
            z-index: 10;
            /* Bosish imkoniyatlari */
            cursor: pointer;
            pointer-events: auto;
        }

        @media (max-width: 600px) { 
            #welcome-text { font-size: 2rem; } 
        }
    </style>
</head>
<body>

<!-- Yozuv o'zgartirildi va onclick qo'shildi -->
<div id="welcome-text" onclick="window.location.href='asosiy.html'">
    Welcome to our website
</div>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    const textElement = document.getElementById('welcome-text');

    let scale, centerX, centerY;
    let t = 0;
    const particles = [];
    let drawingFinished = false;
    let startTime = null;
    const duration = 3000; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
        const minSide = Math.min(canvas.width, canvas.height);
        scale = minSide / 45; 
    }

    window.addEventListener('resize', resize);
    resize();

    function heartX(k) { return 15 * Math.pow(Math.sin(k), 3); }
    function heartY(k) { return -(13 * Math.cos(k) - 5 * Math.cos(2 * k) - 2 * Math.cos(3 * k) - Math.cos(4 * k)); }

    class Particle {
        constructor() {
            this.x = centerX;
            this.y = centerY;
            this.size = Math.random() * 4 + 1;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            this.speedX = Math.cos(angle) * speed;
            this.speedY = Math.sin(angle) * speed;
            // Hsl xatosi tuzatildi
            this.color = `hsl(${Math.random() * 40 + 330}, 100%, 70%)`;
            this.alpha = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= 0.01;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function animate(currentTime) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. Yurak chizish
        if (t < Math.PI * 2) {
            ctx.strokeStyle = "#f73487";
            ctx.lineWidth = 4;
            ctx.lineJoin = "round";
            ctx.beginPath();
            for (let j = 0; j <= t; j += 0.05) {
                let x = centerX + heartX(j) * scale;
                let y = centerY + heartY(j) * scale;
                if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            t += 0.05;
            if (t >= Math.PI * 2) {
                drawingFinished = true;
                startTime = currentTime;
            }
        }

        // 2. Effektlar (yurakdan keyin zarrachalar va yozuv)
        if (drawingFinished && startTime) {
            if ((currentTime - startTime) < duration) {
                for(let i=0; i<5; i++) particles.push(new Particle());
            } else {
                textElement.style.opacity = "1";
            }
        }

        // Zarrachalarni yangilash
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
</script>

</body>
</html>

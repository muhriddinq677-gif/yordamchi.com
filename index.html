<!DOCTYPE html>
<html lang="en">
<head>
     <meta name="google-site-verification" content="6KDW8WatE_Nkdg4kQwuuc7iC4-Ka6697idZS3tRBAGk" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Auth</title>
    <style>
        body { margin: 0; background: #0b0813; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .box { background: #13111c; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, .btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d293d; background: #1c1926; color: #fff; box-sizing: border-box; outline: none; }
        .btn { background: #008cff; border: none; font-weight: bold; cursor: pointer; }
        .btn-sub { background: #333; }
        .link { color: #008cff; cursor: pointer; font-size: 0.9rem; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #2d293d; margin: 0 auto 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- RESTRATSIYA -->
    <div id="reg" class="box">
        <h3>Ro'yxatdan o'tish</h3>
        <input type="text" id="rName" placeholder="Ism">
        <input type="email" id="rEmail" placeholder="Email">
        <input type="password" id="rPass" placeholder="Parol (kamida 6 ta)">
        <button class="btn" onclick="auth('reg')">Yaratish</button>
        <p class="link" onclick="view('log')">Kirish sahifasi</p>
    </div>

    <!-- LOGIN -->
    <div id="log" class="box hidden">
        <h3>Tizimga kirish</h3>
        <input type="email" id="lEmail" placeholder="Email">
        <input type="password" id="lPass" placeholder="Parol">
        <button class="btn" onclick="auth('log')">Kirish</button>
        <p class="link" onclick="view('reg')">Ro'yxatdan o'tish</p>
    </div>

    <!-- PROFIL -->
    <div id="prof" class="box hidden">
        <h3>Shaxsiy Profil</h3>
        <div class="avatar" onclick="document.getElementById('file').click()">
            <img id="pImg" class="hidden"> <span id="pText">Rasm yuklash</span>
        </div>
        <input type="file" id="file" accept="image/*" class="hidden" onchange="addImg(event)">
        <p id="pName" style="font-weight: bold; margin: 5px 0;"></p>
        <p id="pEmail" style="color: #888; font-size: 0.9rem; margin-bottom: 20px;"></p>
        <button class="btn" onclick="location.href='asosiy.html'">Saytga o'tish</button>
        <button class="btn btn-sub" onclick="logout()">Chiqish</button>
    </div>

<script>
    const $ = id => document.getElementById(id);
    
    window.onload = () => {
        let user = localStorage.getItem('cur');
        if(user) show(JSON.parse(user));
    }

    function view(id) {
        ['reg', 'log', 'prof'].forEach(x => $(x).classList.add('hidden'));
        $(id).classList.remove('hidden');
    }

    function auth(type) {
        if (type === 'reg') {
            let name = $('rName').value, email = $('rEmail').value, pass = $('rPass').value;
            if(!name || !email || pass.length < 6) return alert("Ma'lumotlar xato!");
            let u = { name, email, pass, img: "" };
            localStorage.setItem(email, JSON.stringify(u));
            localStorage.setItem('cur', JSON.stringify(u));
            show(u);
        } else {
            let u = JSON.parse(localStorage.getItem($('lEmail').value));
            if(!u || u.pass !== $('lPass').value) return alert("Email yoki parol xato!");
            localStorage.setItem('cur', JSON.stringify(u));
            show(u);
        }
    }

    function show(u) {
        view('prof');
        $('pName').innerText = u.name;
        $('pEmail').innerText = u.email;
        if(u.img) { $('pImg').src = u.img; $('pImg').classList.remove('hidden'); $('pText').classList.add('hidden'); }
    }

    function addImg(e) {
        let fr = new FileReader();
        fr.onload = () => {
            let u = JSON.parse(localStorage.getItem('cur'));
            u.img = fr.result;
            localStorage.setItem('cur', JSON.stringify(u));
            localStorage.setItem(u.email, JSON.stringify(u));
            show(u);
        }
        if(e.target.files[0]) fr.readAsDataURL(e.target.files[0]);
    }

    function logout() {
        localStorage.removeItem('cur');
        location.reload();
    }
</script>
</body>
</html>

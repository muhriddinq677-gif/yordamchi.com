<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Paint Max Pro 2026</title>
    <style>
        :root { --panel-bg: #f5f6f7; --border: #ccc; --active-blue: #0078d7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background-color: #ababab; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Yuqori Panel - Ribbon */
        .ribbon { 
            background: var(--panel-bg); 
            border-bottom: 1px solid #888; 
            padding: 5px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            align-items: center; 
            justify-content: center; 
            z-index: 100;
            min-height: 110px; /* Balandlikni qat'iy belgiladik */
        }
        
        /* Bloklar */
        .group { background: white; border: 1px solid var(--border); padding: 5px 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100px; border-radius: 4px; flex-shrink: 0; }
        .group-label { font-size: 11px; color: #666; font-weight: bold; margin-top: 3px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .grid-shapes { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        
        button { border: 1px solid transparent; background: transparent; cursor: pointer; padding: 4px; border-radius: 3px; font-size: 18px; transition: 0.1s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; }
        button:hover { background: #e5f1fb; border-color: var(--active-blue); }
        button.active { background: #cce4f7; border-color: var(--active-blue); outline: 1px solid #005499; }
        
        input[type="color"] { width: 45px; height: 45px; cursor: pointer; border: 1px solid #888; padding: 0; background: white; }
        input[type="range"] { width: 70px; margin-top: 10px; }

        .amallar-box { display: flex; flex-direction: column; gap: 2px; width: 100%; }
        .amallar-box button { font-size: 12px; font-weight: bold; width: 100%; justify-content: flex-start; border: none; height: 25px; padding-left: 5px; }
        #clearBtn { color: #d93025; }
        #saveBtn { color: #1e8e3e; }

        /* Ishchi maydon */
        .viewport { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: auto; 
            padding: 20px; 
            background-color: #ababab;
        }
        canvas { background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.4); cursor: crosshair; touch-action: none; }
    </style>
</head>
<body>

<div class="ribbon">
    <div class="group">
        <input type="color" id="colorPicker" value="#000000">
        <div class="group-label">Rang</div>
    </div>

    <div class="group" style="min-width: 170px;">
        <div class="grid-container">
            <button id="brushBtn" class="active" title="Qalam">✏️</button>
            <button id="bucketBtn" title="To'ldirish">🪣</button>
            <button id="eraserBtn" title="O'chirg'ich">🧽</button>
            <button id="textBtn" title="Matn">A</button>
            <button id="pipetteBtn" title="Pipetka">🧪</button>
            <button id="undoBtn" title="Orqaga">↩️</button>
            <button id="redoBtn" title="Oldinga">↪️</button>
            <button id="sprayBtn" title="Spray">💨</button>
            <button id="zoomBtn" title="Zoom">🔍</button>
            <button id="selectBtn" title="Tanlash">✂️</button>
        </div>
        <div class="group-label">10ta Asboblar</div>
    </div>

    <div class="group" style="min-width: 320px;">
        <div class="grid-shapes">
            <button id="lineBtn" title="Chiziq">╱</button>
            <button id="rectBtn" title="To'rtburchak">▭</button>
            <button id="circleBtn" title="Aylana">◯</button>
            <button id="triBtn" title="Uchburchak">△</button>
            <button id="rhombusBtn" title="Romb">◊</button>
            <button id="starBtn" title="Yulduz">⭐</button>
            <button id="hexagonBtn" title="Oltiburchak">⬢</button>
            <button id="arrowBtn" title="O'ngga">➔</button>
            <button id="heartBtn" title="Yurak">♥</button>
            <button id="moonBtn" title="Oy">🌙</button>
            <button id="leftArrowBtn" title="Chapga">⬅️</button>
            <button id="upArrowBtn" title="Tepaga">⬆️</button>
            <button id="downArrowBtn" title="Pastga">⬇️</button>
            <button id="cloudBtn" title="Bulut">☁️</button>
            <button id="boltBtn" title="Chaqmoq">⚡</button>
            <button id="sunBtn" title="Quyosh">☀️</button>
            <button id="crossBtn" title="Xoch">➕</button>
            <button id="octagonBtn" title="Sakkizburchak">🛑</button>
            <button id="trapezoidBtn" title="Trapeksiya">⏢</button>
            <button id="bubbleBtn" title="Chat">💭</button>
        </div>
        <div class="group-label">20ta Shakllar</div>
    </div>

    <div class="group">
        <input type="range" id="sizePicker" min="1" max="50" value="3">
        <div class="group-label">Qalinlik</div>
    </div>

    <div class="group" style="min-width: 110px;">
        <div class="amallar-box">
            <button id="clearBtn">🗑 Tozalash</button>
            <button id="saveBtn">💾 Saqlash</button>
        </div>
        <div class="group-label">Amallar</div>
    </div>
</div>

<div class="viewport">
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const colorInput = document.getElementById('colorPicker');
    const sizeInput = document.getElementById('sizePicker');
    
    let painting = false, tool = 'brush', startX, startY, snapshot;
    let history = [], redoHistory = [];

    function init() {
        canvas.width = 1000; canvas.height = 550;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        saveStep();
    }
    init();

    function saveStep() {
        if (history.length > 30) history.shift();
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        redoHistory = [];
    }

    function undo() { if (history.length > 1) { redoHistory.push(history.pop()); ctx.putImageData(history[history.length - 1], 0, 0); } }
    function redo() { if (redoHistory.length > 0) { const data = redoHistory.pop(); history.push(data); ctx.putImageData(data, 0, 0); } }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: Math.floor(clientX - rect.left), y: Math.floor(clientY - rect.top) };
    }

    function startDraw(e) {
        const pos = getPos(e);
        if (tool === 'bucket') { floodFill(pos.x, pos.y, colorInput.value); return; }
        painting = true; startX = pos.x; startY = pos.y;
        snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
    }

    function drawing(e) {
        if (!painting) return;
        const pos = getPos(e);
        ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : colorInput.value;
        ctx.fillStyle = colorInput.value;
        ctx.lineWidth = sizeInput.value;
        if (tool === 'brush' || tool === 'eraser') {
            ctx.lineTo(pos.x, pos.y); ctx.stroke();
        } else if (tool === 'spray') {
            for(let i=0; i<20; i++) ctx.fillRect(pos.x+(Math.random()-0.5)*20, pos.y+(Math.random()-0.5)*20, 1, 1);
        } else {
            ctx.putImageData(snapshot, 0, 0);
            drawShape(pos.x, pos.y);
        }
    }

    function drawShape(x, y) {
        ctx.beginPath();
        let w = x - startX, h = y - startY;
        if (tool === 'line') { ctx.moveTo(startX, startY); ctx.lineTo(x, y); }
        else if (tool === 'rect') ctx.strokeRect(startX, startY, w, h);
        else if (tool === 'circle') ctx.arc(startX, startY, Math.sqrt(w*w + h*h), 0, Math.PI*2);
        else if (tool === 'tri') { ctx.moveTo(startX, startY); ctx.lineTo(x, y); ctx.lineTo(startX*2-x, y); ctx.closePath(); }
        else if (tool === 'rhombus') { ctx.moveTo(startX, startY-h); ctx.lineTo(x, startY); ctx.lineTo(startX, startY+h); ctx.lineTo(startX-w, startY); ctx.closePath(); }
        else if (tool === 'star') { 
            let r = Math.abs(w); 
            for(let i=0; i<10; i++) { let ra = i%2===0 ? r : r/2; ctx.lineTo(startX+ra*Math.cos(i*Math.PI/5-Math.PI/2), startY+ra*Math.sin(i*Math.PI/5-Math.PI/2)); } 
            ctx.closePath(); 
        }
        else if (tool.includes('Arrow')) { drawArrow(startX, startY, x, y, tool); }
        else if (tool === 'heart') {
            ctx.moveTo(startX, startY + h/4);
            ctx.bezierCurveTo(startX, startY, startX-w, startY, startX-w, startY+h/2);
            ctx.bezierCurveTo(startX-w, startY+h, startX, startY+h*1.2, startX, startY+h*1.5);
            ctx.bezierCurveTo(startX, startY+h*1.2, startX+w, startY+h, startX+w, startY+h/2);
            ctx.bezierCurveTo(startX+w, startY, startX, startY, startX, startY+h/4);
        }
        ctx.stroke();
    }

    function drawArrow(x1, y1, x2, y2, type) {
        let head = 15; let angle = Math.atan2(y2-y1, x2-x1);
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.lineTo(x2-head*Math.cos(angle-0.5), y2-head*Math.sin(angle-0.5));
        ctx.moveTo(x2, y2); ctx.lineTo(x2-head*Math.cos(angle+0.5), y2-head*Math.sin(angle+0.5));
    }

    function floodFill(startX, startY, fillCol) {
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const data = img.data; const pos = (startY*canvas.width+startX)*4;
        const target = [data[pos], data[pos+1], data[pos+2]];
        const fill = [parseInt(fillCol.slice(1,3),16), parseInt(fillCol.slice(3,5),16), parseInt(fillCol.slice(5,7),16)];
        if(target[0]===fill[0] && target[1]===fill[1] && target[2]===fill[2]) return;
        const q = [[startX,startY]];
        while(q.length > 0) {
            const [x,y] = q.pop(); const idx = (y*canvas.width+x)*4;
            if(data[idx]===target[0] && data[idx+1]===target[1] && data[idx+2]===target[2]) {
                data[idx]=fill[0]; data[idx+1]=fill[1]; data[idx+2]=fill[2]; data[idx+3]=255;
                if(x>0) q.push([x-1,y]); if(x<canvas.width-1) q.push([x+1,y]);
                if(y>0) q.push([x,y-1]); if(y<canvas.height-1) q.push([x,y+1]);
            }
        }
        ctx.putImageData(img,0,0); saveStep();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', drawing);
    window.addEventListener('mouseup', () => { if(painting) { saveStep(); painting = false; } });

    document.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
            if (btn.id === 'undoBtn') { undo(); return; }
            if (btn.id === 'redoBtn') { redo(); return; }
            if (btn.id === 'clearBtn') { ctx.fillStyle="white"; ctx.fillRect(0,0,canvas.width,canvas.height); saveStep(); return; }
            if (btn.id === 'saveBtn') { const a = document.createElement('a'); a.download = 'paint_2026.png'; a.href = canvas.toDataURL(); a.click(); return; }
            document.querySelector('.active')?.classList.remove('active');
            btn.classList.add('active'); tool = btn.id.replace('Btn', '');
        };
    });
    // 📱 TOUCH SUPPORT (telefon uchun)
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startDraw(e);
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    drawing(e);
});

window.addEventListener('touchend', () => {
    if (painting) {
        saveStep();
        painting = false;
    }
});
</script>
</body>
</html>
